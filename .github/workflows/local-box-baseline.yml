name: local-box-baseline

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: local-box-baseline-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checklist-curl-guardrails:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Guardrail — checklist curl timeout scan
        run: ./scripts/check_checklist_curl_guardrails.sh

  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONPATH: .
      PIP_NO_INPUT: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements.in
      - name: Upgrade pip (non-interactive)
        run: python -m pip install --upgrade pip
      - name: Install parent-repo Python deps
        run: python -m pip install -r requirements.txt
      - name: Baseline — required files + checklist curl guardrails
        run: ./scripts/check_local_box_baseline.sh
      # Local optional --out must be a file path, not a directory (see README / go_live_status_report.sh --help). CI prints to stdout only.
      - name: Smoke — go-live status report parses checklist
        run: ./scripts/go_live_status_report.sh
      - name: Smoke — local_box audit DB path + init_db
        run: |
          python - <<'PY'
          from local_box.audit import event_store
          print("DB_PATH", event_store.DB_PATH)
          event_store.init_db()
          print("LOCAL_BOX_SQLITE_SMOKE ok")
          PY
      - name: Smoke — import local_box.runner (full parent import chain)
        run: |
          python - <<'PY'
          import local_box.runner  # noqa: F401
          print("LOCAL_BOX_RUNNER_IMPORT ok")
          PY
      - name: Smoke — import local_box.control.server (Flask control plane)
        run: |
          python - <<'PY'
          import local_box.control.server as ctl
          assert getattr(ctl, "app", None) is not None
          print("LOCAL_BOX_CONTROL_IMPORT ok")
          PY
