name: local-box-baseline

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install parent-repo Python deps
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
      - name: Run local box baseline check
        run: ./scripts/check_local_box_baseline.sh
      - name: Smoke — local_box audit DB path + init_db
        env:
          PYTHONPATH: .
        run: |
          python - <<'PY'
          from local_box.audit import event_store
          print("DB_PATH", event_store.DB_PATH)
          event_store.init_db()
          print("LOCAL_BOX_SQLITE_SMOKE ok")
          PY
