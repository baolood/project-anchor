# Daily default env (generated by risk_core_tag_release.sh)
# Override is merged by docker compose; extreme mode still uses explicit env.
# Canonical testnet runtime now relies on TESTNET_EXCHANGE_* and TESTNET_EXECUTOR_* only.
services:
  backend:
    env_file:
      - /etc/project-anchor/testnet.env
    environment:
      EXECUTION_MODE: ${EXECUTION_MODE:-}
      TESTNET_EXCHANGE_BASE_URL: ${TESTNET_EXCHANGE_BASE_URL:-https://demo-fapi.binance.com}
      TESTNET_EXCHANGE_API_KEY: ${TESTNET_EXCHANGE_API_KEY:-}
      TESTNET_EXCHANGE_API_SECRET: ${TESTNET_EXCHANGE_API_SECRET:-}
      TESTNET_EXCHANGE_KEY_ID: ${TESTNET_EXCHANGE_KEY_ID:-}
      TESTNET_EXECUTOR_MODE: ${TESTNET_EXECUTOR_MODE:-real}
      TESTNET_EXECUTOR_REAL_ENABLE: ${TESTNET_EXECUTOR_REAL_ENABLE:-1}
  worker:
    env_file:
      - /etc/project-anchor/testnet.env
    environment:
      CAPITAL_USD: "1000"
      MAX_SINGLE_TRADE_RISK_PCT: "0.5"
      MAX_NET_EXPOSURE_PCT: "30"
      MAX_LEVERAGE: "5"
      MAX_DAILY_DRAWDOWN_PCT: "3"
      RISK_HARD_LIMITS_DISABLE: "0"
      RISK_EXPOSURE_ATOMIC: "1"
      EXECUTION_MODE: ${EXECUTION_MODE:-}
      TESTNET_EXCHANGE_BASE_URL: ${TESTNET_EXCHANGE_BASE_URL:-https://demo-fapi.binance.com}
      TESTNET_EXCHANGE_API_KEY: ${TESTNET_EXCHANGE_API_KEY:-}
      TESTNET_EXCHANGE_API_SECRET: ${TESTNET_EXCHANGE_API_SECRET:-}
      TESTNET_EXCHANGE_KEY_ID: ${TESTNET_EXCHANGE_KEY_ID:-}
      TESTNET_EXECUTOR_MODE: ${TESTNET_EXECUTOR_MODE:-real}
      TESTNET_EXECUTOR_REAL_ENABLE: ${TESTNET_EXECUTOR_REAL_ENABLE:-1}
